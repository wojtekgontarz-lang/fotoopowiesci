backend:
  name: github
  repo: wojtekgontarz-lang/fotoopowiesci
  branch: main
  base_url: https://decapcms.org

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "settings"
    label: "Ustawienia strony"
    files:
      - name: "general"
        label: "Ogólne (nazwa, kontakt, hero)"
        file: "_data/general.json"
        fields:
          - { label: "Imię i nazwisko fotografa", name: "photographer_name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Tekst w sekcji Hero", name: "hero_text", widget: "text" }
          - { label: "E-mail kontaktowy", name: "email", widget: "string" }
          - { label: "Telefon", name: "phone", widget: "string" }
          - { label: "Miasto / obszar działania", name: "location", widget: "string" }
          - { label: "Tekst sekcji O mnie", name: "about_text", widget: "text" }

      - name: "packages"
        label: "Pakiety cenowe"
        file: "_data/packages.json"
        fields:
          - label: "Pakiety"
            name: "packages"
            widget: "list"
            fields:
              - { label: "Nazwa pakietu", name: "name", widget: "string" }
              - { label: "Cena", name: "price", widget: "string" }
              - { label: "Wyróżniony?", name: "featured", widget: "boolean", default: false }
              - label: "Punkty pakietu"
                name: "features"
                widget: "list"
                field: { label: "Punkt", name: "item", widget: "string" }

      - name: "gallery"
        label: "Galeria zdjęć"
        file: "_data/gallery.json"
        fields:
          - label: "Zdjęcia"
            name: "photos"
            widget: "list"
            fields:
              - { label: "Link do zdjęcia", name: "src", widget: "string" }
              - { label: "Opis", name: "alt", widget: "string" }
              - { label: "Kategoria", name: "category", widget: "string" }

      - name: "testimonials"
        label: "Opinie klientów"
        file: "_data/testimonials.json"
        fields:
          - label: "Opinie"
            name: "testimonials"
            widget: "list"
            fields:
              - { label: "Imię i nazwisko", name: "name", widget: "string" }
              - { label: "Firma / wydarzenie", name: "company", widget: "string" }
              - { label: "Treść opinii", name: "text", widget: "text" }
